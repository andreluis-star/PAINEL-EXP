<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORTOEX — Mão de Obra 3º</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --navy: #0D1B3E;
  --yellow: #F5C518;
  --white: #FFFFFF;
  --gray-400: #9BA3AF;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: #111;
  font-family: 'Barlow Condensed', sans-serif;
}

#app-root {
  display: flex;
  flex-direction: column;
  transform-origin: top left;
  background: #111;
}

/* ===== LOGIN OVERLAY ===== */
#login-overlay {
  position: fixed;
  inset: 0;
  background: #0a0f1e;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.login-box {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-top: 4px solid var(--yellow);
  border-radius: 8px;
  padding: 40px 48px;
  width: 380px;
  text-align: center;
}
.login-logo {
  background: var(--yellow);
  color: var(--navy);
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 3px;
  padding: 6px 16px;
  border-radius: 4px;
  display: inline-block;
  margin-bottom: 12px;
}
.login-title {
  color: var(--white);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.login-sub {
  color: var(--gray-400);
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.login-field {
  margin-bottom: 14px;
  text-align: left;
}
.login-field label {
  display: block;
  color: var(--gray-400);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.login-field input {
  width: 100%;
  background: #111;
  border: 1px solid #333;
  border-radius: 4px;
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 600;
  padding: 10px 14px;
  outline: none;
  transition: border-color .2s;
}
.login-field input:focus { border-color: var(--yellow); }
.login-btn {
  width: 100%;
  margin-top: 8px;
  background: var(--yellow);
  color: var(--navy);
  border: none;
  border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 12px;
  cursor: pointer;
  transition: opacity .2s;
}
.login-btn:hover { opacity: .85; }
.login-error {
  margin-top: 12px;
  color: #e74c3c;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  min-height: 18px;
}

/* HEADER */
.tv-header {
  background: var(--navy);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  border-bottom: 4px solid var(--yellow);
  flex-shrink: 0;
}
.tv-logo { display: flex; align-items: center; gap: 14px; }
.tv-logo-box {
  background: var(--yellow);
  color: var(--navy);
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 2px;
  padding: 5px 12px;
  border-radius: 4px;
}
.tv-title  { color: var(--white); font-size: 24px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }
.tv-subtitle { color: var(--yellow); font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
.tv-header-right { text-align: right; }
.tv-date { color: var(--white); font-size: 18px; font-weight: 700; }
.tv-time { color: var(--yellow); font-size: 45px; font-weight: 900; letter-spacing: 2px; font-variant-numeric: tabular-nums; }
.tv-empresa-tag {
  margin-left: 16px;
  background: rgba(245,197,24,.15);
  color: var(--yellow);
  border: 1px solid rgba(245,197,24,.3);
  border-radius: 4px;
  padding: 4px 12px;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* STATS BAR */
.stats-bar {
  background: #1a1a1a;
  border-bottom: 1px solid #333;
  padding: 0 24px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  height: 48px;
}
.stat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-right: 24px;
  margin-right: 24px;
  border-right: 1px solid #333;
}
.stat-label { font-size: 10px; font-weight: 700; color: var(--gray-400); letter-spacing: 2px; text-transform: uppercase; }
.stat-val   { font-size: 24px; font-weight: 900; color: var(--white); line-height: 1; }
.stat-val.yellow { color: var(--yellow); }
.stat-val.green  { color: #2ecc71; }
.stat-val.blue   { color: #60a5fa; }
.stat-val.purple { color: #a78bfa; }
.tv-live {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; font-weight: 700; color: var(--gray-400); letter-spacing: 2px; text-transform: uppercase;
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #2ecc71;
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
@keyframes blink-yellow { 0%,100%{ color:var(--yellow); text-shadow:0 0 10px rgba(245,197,24,0.7); } 50%{ color:rgba(245,197,24,0.15); text-shadow:none; } }
@keyframes blink-red    { 0%,100%{ color:#e74c3c; text-shadow:0 0 8px rgba(231,76,60,0.7); } 50%{ color:rgba(231,76,60,0.15); text-shadow:none; } }
.entrada-overtime { color: var(--yellow) !important; animation: blink-yellow 1s ease-in-out infinite; }
.td-nome-overtime { animation: blink-yellow 1s ease-in-out infinite; }

/* CONTENT */
.tv-content {
  padding: 12px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.extra-sections {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* SECTION */
.cc-section {
  background: #1a1a1a;
  border-radius: 6px;
  border: 1px solid #333;
  display: flex;
  flex-direction: column;
}
.cc-header { padding: 8px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.cc-rota      { background: var(--navy);  border-bottom: 2px solid var(--yellow); }
.cc-expedicao { background: #1a2a1a; border-bottom: 2px solid #2ecc71; }
.cc-title { font-size: 17px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
.cc-rota .cc-title      { color: var(--yellow); }
.cc-expedicao .cc-title { color: #2ecc71; }
.cc-count { font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 10px; letter-spacing: 1px; }
.cc-rota .cc-count      { background: rgba(245,197,24,.15); color: var(--yellow); }
.cc-expedicao .cc-count { background: rgba(46,204,113,.15); color: #2ecc71; }

/* TABLE */
.table-scroll { overflow: visible; }
.tv-table { width: 100%; border-collapse: collapse; }
.tv-table thead tr { background: #111; position: sticky; top: 0; z-index: 1; }
.tv-table thead th {
  padding: 7px 10px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  color: var(--gray-400);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border-bottom: 1px solid #333;
  white-space: nowrap;
}
.tv-table thead th.center { text-align: center; }
.tv-table tbody tr { border-bottom: 1px solid #1e1e1e; }
.tv-table tbody tr:nth-child(even) { background: rgba(255,255,255,.025); }
.tv-table tbody tr:last-child { border-bottom: none; }
.tv-table tbody td { padding: 7px 10px; vertical-align: middle; }

.td-num  { color: var(--gray-400); font-size: 12px; font-weight: 600; width: 30px; text-align: center; }
.td-nome { font-size: 16px; font-weight: 700; color: var(--white); }
.td-empresa { font-size: 11px; color: var(--gray-400); }
.td-op   { font-size: 13px; font-weight: 700; color: var(--yellow); }
.td-func { font-size: 11px; color: var(--gray-400); }
.td-time { font-size: 17px; font-weight: 800; font-variant-numeric: tabular-nums; text-align: center; }
.td-time.entrada    { color: #3498db; }
.td-time.saida-prev { color: var(--gray-400); }
.td-time.saida-real { color: #2ecc71; }
.td-motorista { font-size: 13px; font-weight: 600; color: #a78bfa; }
.md-input {
  background: transparent; border: 1px solid #444; border-radius: 4px;
  color: var(--yellow); font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700; width: 80px; padding: 3px 6px;
  text-align: center; outline: none;
}
.md-input:focus { border-color: var(--yellow); background: rgba(245,197,24,.05); }
.md-input::placeholder { color: #444; font-size: 11px; }

/* STATUS */
.status-pill {
  display: inline-flex; align-items: center;
  padding: 3px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap;
}
.s-escolha  { background: rgba(180,83,9,.2);   color: #f59e0b; border: 1px solid #f59e0b40; }
.s-validada { background: rgba(21,101,192,.2);  color: #60a5fa; border: 1px solid #60a5fa40; }
.s-presente { background: rgba(26,127,75,.2);   color: #4ade80; border: 1px solid #4ade8040; }
.s-ausente  { background: rgba(192,57,43,.2);   color: #f87171; border: 1px solid #f8717140; }
.s-encerrado{ background: rgba(100,100,100,.2); color: #9ca3af; border: 1px solid #9ca3af40; }

.tv-empty { text-align: center; padding: 40px; color: #333; font-size: 18px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }

/* ATRASO */
.td-nome-atraso { font-size: 16px; font-weight: 700; animation: blink-red 1s ease-in-out infinite; }
.badge-atraso {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(231,76,60,.2); color: #e74c3c;
  border: 1px solid #e74c3c60;
  padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
  animation: pulse-red 1.5s infinite;
}
.badge-extra {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(245,197,24,.2); color: var(--yellow);
  border: 1px solid rgba(245,197,24,.6);
  padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
  animation: blink-yellow 1s ease-in-out infinite;
}
@keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.5} }

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

/* REMEMBER ME */
.login-remember {
  display: flex; align-items: center; gap: 9px;
  margin-top: 4px; margin-bottom: 0;
  font-size: 12px; font-weight: 600; color: var(--gray-400);
  letter-spacing: 1px; cursor: pointer; text-transform: uppercase;
}
.login-remember input[type=checkbox] {
  width: 15px; height: 15px; cursor: pointer; accent-color: var(--yellow);
}

/* ADMIN BUTTON in header */
#btn-admin {
  display: none;
  background: rgba(245,197,24,.15);
  color: var(--yellow);
  border: 1px solid rgba(245,197,24,.35);
  border-radius: 4px;
  padding: 5px 13px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer;
  transition: background .2s;
}
#btn-admin:hover { background: rgba(245,197,24,.28); }

/* LOGOUT BUTTON */
#btn-logout {
  display: none;
  background: rgba(255,255,255,.06);
  color: var(--gray-400);
  border: 1px solid #333;
  border-radius: 4px;
  padding: 5px 13px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer;
  transition: background .2s;
}
#btn-logout:hover { background: rgba(255,255,255,.12); color: #fff; }

/* ADMIN MODAL */
#admin-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.88); z-index: 8000;
  align-items: center; justify-content: center;
}
#admin-modal.open { display: flex; }
.adm-box {
  background: #12121e;
  border: 1px solid #2a2a4a;
  border-top: 4px solid var(--yellow);
  border-radius: 8px;
  padding: 26px 30px;
  width: 720px; max-width: 96vw; max-height: 88vh;
  overflow-y: auto;
}
.adm-box h2 {
  color: var(--yellow); font-size: 18px; font-weight: 900;
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;
}
.adm-close {
  background: #333; color: #aaa; border: none; border-radius: 4px;
  padding: 4px 12px; font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px;
}
.adm-close:hover { background: #555; color: #fff; }
.adm-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
.adm-table th {
  background: #1a1a2e; color: var(--yellow);
  padding: 7px 10px; text-align: left;
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  border-bottom: 1px solid #333;
}
.adm-table td { padding: 7px 10px; border-bottom: 1px solid #1e1e1e; color: #ddd; }
.adm-table tr:hover td { background: rgba(245,197,24,.04); }
.adm-form {
  background: #1a1a2e; border: 1px solid #2a2a4a;
  border-radius: 6px; padding: 16px 18px;
}
.adm-form h3 {
  color: var(--gray-400); font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px;
}
.adm-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; align-items: end; }
.adm-grid label { font-size: 10px; font-weight: 700; color: var(--gray-400); letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-bottom: 5px; }
.adm-grid input, .adm-grid select {
  width: 100%; background: #111; border: 1px solid #333;
  border-radius: 4px; color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 600; padding: 8px 10px; outline: none;
}
.adm-grid input:focus, .adm-grid select:focus { border-color: var(--yellow); }
.adm-grid select option { background: #111; }
.adm-actions { display: flex; gap: 8px; margin-top: 14px; }
.adm-save { background: var(--yellow); color: var(--navy); border: none; border-radius: 4px; padding: 8px 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 900; letter-spacing: 1px; cursor: pointer; }
.adm-clear { background: #222; color: #aaa; border: 1px solid #333; border-radius: 4px; padding: 8px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
.adm-del { background: rgba(231,76,60,.2); color: #e74c3c; border: 1px solid #e74c3c60; border-radius: 4px; padding: 3px 9px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800; cursor: pointer; }
.adm-del:hover { background: rgba(231,76,60,.4); }
.adm-edit { background: rgba(245,197,24,.15); color: var(--yellow); border: 1px solid rgba(245,197,24,.3); border-radius: 4px; padding: 3px 9px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800; cursor: pointer; }
.adm-edit:hover { background: rgba(245,197,24,.3); }
.badge-admin   { background: rgba(245,197,24,.2); color: var(--yellow); padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 800; letter-spacing: 1px; }
.badge-empresa { background: rgba(46,204,113,.2); color: #2ecc71; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 800; letter-spacing: 1px; }
.badge-user    { background: rgba(255,255,255,.1); color: #9ba3af; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 800; letter-spacing: 1px; }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">PORTOEX</div>
    <div class="login-title">Painel TV</div>
    <div class="login-sub">Mão de Obra Terceirizada</div>
    <div class="login-field">
      <label>Usuário</label>
      <input type="text" id="login-user" placeholder="Login" autocomplete="off" autocapitalize="off">
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="Senha">
    </div>
    <label class="login-remember"><input type="checkbox" id="login-remember"> Lembrar senha</label>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app-root">
<header class="tv-header">
  <div class="tv-logo">
    <div class="tv-logo-box">PORTOEX</div>
    <div>
      <div class="tv-title">Mão de Obra — 3°</div>
      <div class="tv-subtitle">Colaboradores Terceirizados</div>
    </div>
    <span class="tv-empresa-tag" id="tv-empresa-tag" style="display:none"></span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button id="btn-admin" onclick="openAdmin()">⚙ Admin</button>
    <button id="btn-logout" onclick="doLogout()">Sair</button>
  </div>
  <div class="tv-header-right">
    <div class="tv-date" id="tv-date">—</div>
    <div class="tv-time" id="tv-time">00:00:00</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item">
    <span class="stat-label">Total</span>
    <span class="stat-val yellow" id="tot-total">0</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">Presentes</span>
    <span class="stat-val green" id="tot-presentes">0</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">Rota</span>
    <span class="stat-val blue" id="tot-rota">0</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">Expedição</span>
    <span class="stat-val purple" id="tot-expedicao">0</span>
  </div>
  <div class="tv-live">
    <div class="live-dot"></div>
    Ao vivo
  </div>
</div>

<div class="tv-content" id="tv-content">
  <div class="tv-empty">Carregando dados...</div>
</div>
</div><!-- /app-root -->

  { login: 'LJA',                  senha: '123456',     tipo: 'empresa', filtro: 'LJA' },
  { login: 'RP',                   senha: 'RP123',      tipo: 'empresa', filtro: 'RP' },
  { login: 'IAGO',                 senha: '123456',     tipo: 'empresa', filtro: 'IAGO' },
  { login: 'LITORAL',              senha: '123456',     tipo: 'empresa', filtro: 'litoral' }
];

function getUsers() {
  try { const s=localStorage.getItem(TV_USERS_KEY); return s?JSON.parse(s):null; } catch{ return null; }
}
function ensureUsers() {
  if (!getUsers()) localStorage.setItem(TV_USERS_KEY, JSON.stringify(DEFAULT_USERS));
}
function saveUsers(u) { localStorage.setItem(TV_USERS_KEY, JSON.stringify(u)); }

function getSession() {
  try {
    return JSON.parse(localStorage.getItem(TV_SESSION_KEY) || sessionStorage.getItem(TV_SESSION_KEY) || 'null');
  } catch { return null; }
}
function setSession(login, remember) {
  const d = JSON.stringify({ login });
  if (remember) localStorage.setItem(TV_SESSION_KEY, d);
  else sessionStorage.setItem(TV_SESSION_KEY, d);
}
function clearSession() {
  localStorage.removeItem(TV_SESSION_KEY);
  sessionStorage.removeItem(TV_SESSION_KEY);
}

let filtroEmpresa = null;
let CURRENT_USER  = null;

function doLogin() {
  ensureUsers();
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const remember = document.getElementById('login-remember').checked;
  const err = document.getElementById('login-error');

  const users = getUsers();
  const found = users.find(u => u.login.toUpperCase() === user.toUpperCase() && u.senha === pass);

  if (!found) {
    err.textContent = 'Usuário ou senha inválidos.';
    document.getElementById('login-pass').value = '';
    return;
  }

  onLoginSuccess(found, remember);
}

function onLoginSuccess(user, remember) {
  CURRENT_USER  = user;
  filtroEmpresa = user.filtro || null;
  if (remember !== undefined) setSession(user.login, remember);

  // Tag da empresa no header
  const tag = document.getElementById('tv-empresa-tag');
  if (user.tipo === 'empresa' && user.filtro) {
    tag.textContent = user.filtro.toUpperCase();
    tag.style.display = 'inline-block';
  } else {
    tag.style.display = 'none';
  }

  // Botões admin / logout
  document.getElementById('btn-admin').style.display  = user.tipo === 'admin'  ? 'inline-block' : 'none';
  document.getElementById('btn-logout').style.display = 'inline-block';

  // Remove overlay
  document.getElementById('login-overlay').style.display = 'none';

  // Inicia Firebase e render
  initFirebase();
}

function doLogout() {
  clearSession();
  CURRENT_USER = null; filtroEmpresa = null;
  document.getElementById('btn-admin').style.display  = 'none';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('tv-empresa-tag').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-overlay').style.display = 'flex';
}

// Auto-login se tiver sessão salva
(function checkSession() {
  ensureUsers();
  const sess = getSession();
  if (sess && sess.login) {
    const found = getUsers().find(u => u.login.toUpperCase() === sess.login.toUpperCase());
    if (found) { onLoginSuccess(found); return; }
  }
  document.getElementById('login-user').focus();
})();

// Enter nos campos
document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-pass').focus(); });

// ===== ADMIN PANEL =====
let _editLogin = null;

function openAdmin() {
  if (!CURRENT_USER || CURRENT_USER.tipo !== 'admin') return;
  renderAdmTable();
  clearAdmForm();
  document.getElementById('admin-modal').classList.add('open');
}
function closeAdmin() { document.getElementById('admin-modal').classList.remove('open'); }

function renderAdmTable() {
  const users = getUsers();
  document.getElementById('adm-tbody').innerHTML = users.map(u => `
    <tr>
      <td><b>${u.login}</b></td>
      <td style="font-family:monospace;color:#666">${u.login==='ADMIN'?'••••••••':u.senha}</td>
      <td><span class="badge-${u.tipo}">${u.tipo.toUpperCase()}</span></td>
      <td style="color:#2ecc71">${u.filtro||'—'}</td>
      <td style="display:flex;gap:6px">
        <button class="adm-edit" onclick="editAdmUser('${u.login}')">✏ Editar</button>
        ${u.login!=='ADMIN'?`<button class="adm-del" onclick="delAdmUser('${u.login}')">🗑</button>`:''}
      </td>
    </tr>`).join('');
}

function editAdmUser(login) {
  const u = getUsers().find(x => x.login === login);
  if (!u) return;
  _editLogin = login;
  document.getElementById('adm-login').value  = u.login;
  document.getElementById('adm-senha').value  = u.senha;
  document.getElementById('adm-tipo').value   = u.tipo;
  document.getElementById('adm-filtro').value = u.filtro || '';
  document.getElementById('adm-filtro-wrap').style.display = u.tipo === 'empresa' ? 'block' : 'none';
  document.getElementById('adm-form-title').textContent = '✏ Editando: ' + login;
}

function delAdmUser(login) {
  if (login === 'ADMIN') { alert('Não é possível excluir o ADMIN.'); return; }
  if (!confirm('Excluir usuário ' + login + '?')) return;
  saveUsers(getUsers().filter(u => u.login !== login));
  renderAdmTable();
}

function saveAdmUser() {
  const login   = document.getElementById('adm-login').value.trim().toUpperCase();
  const senha   = document.getElementById('adm-senha').value.trim();
  const tipo    = document.getElementById('adm-tipo').value;
  const filtro  = document.getElementById('adm-filtro').value.trim() || null;
  if (!login || !senha) { alert('Preencha login e senha.'); return; }
  if (tipo === 'empresa' && !filtro) { alert('Informe o filtro para usuário Empresa.'); return; }
  const users = getUsers();
  const entry = { login, senha, tipo, filtro: tipo === 'empresa' ? filtro : null };
  if (_editLogin) {
    const idx = users.findIndex(u => u.login === _editLogin);
    if (idx >= 0) users[idx] = entry;
  } else {
    if (users.find(u => u.login === login)) { alert('Login já existe. Use Editar.'); return; }
    users.push(entry);
  }
  saveUsers(users);
  clearAdmForm();
  renderAdmTable();
}

function clearAdmForm() {
  _editLogin = null;
  document.getElementById('adm-login').value = '';
  document.getElementById('adm-senha').value = '';
  document.getElementById('adm-tipo').value  = 'user';
  document.getElementById('adm-filtro').value = '';
  document.getElementById('adm-filtro-wrap').style.display = 'none';
  document.getElementById('adm-form-title').textContent = '➕ Novo Usuário';
}

// ===== RELÓGIO =====
function updateClock() {
  const now = new Date();
  const dias  = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('tv-date').textContent =
    `${dias[now.getDay()]}, ${now.getDate()} ${meses[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('tv-time').textContent =
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();

// ===== FILTRO POR EMPRESA =====
function pertenceAEmpresa(a) {
  if (!filtroEmpresa) return true; // acesso total
  const f = filtroEmpresa.toLowerCase();
  return (
    (a.empresaNome  || '').toLowerCase().includes(f) ||
    (a.opNome       || '').toLowerCase().includes(f) ||
    (a.opCC         || '').toLowerCase().includes(f)
  );
}

// ===== RENDER =====
function render() {
  const content = document.getElementById('tv-content');
  const hoje = new Date().toISOString().split('T')[0];

  let items = Object.entries(STATE.acompanhamento)
    .filter(([,a]) => a.data === hoje && pertenceAEmpresa(a));

  if (!items.length) {
    content.innerHTML = '<div class="tv-empty">Nenhum colaborador cadastrado para hoje.</div>';
    updateTotais([], [], []);
    return;
  }

  const rota      = items.filter(([,a]) => (a.opCC||'').toUpperCase() === 'ROTA');
  const expedicao = items.filter(([,a]) => { const c=(a.opCC||'').toUpperCase(); return c==='EXPEDIÇÃO'||c==='EXPEDICAO'; });
  const outros    = items.filter(([,a]) => { const c=(a.opCC||'').toUpperCase(); return c!=='ROTA'&&c!=='EXPEDIÇÃO'&&c!=='EXPEDICAO'; });

  // Sempre dois quadros lado a lado: ROTA e EXPEDIÇÃO
  let gridHtml = `<div class="two-col">`;
  gridHtml += buildSection('ROTA',      rota,      'rota');
  gridHtml += buildSection('EXPEDIÇÃO', expedicao, 'expedicao');
  gridHtml += '</div>';

  let extrasHtml = '';
  if (outros.length) {
    const grupos = {};
    outros.forEach(e => { const k = e[1].opCC || e[1].opNome || 'Outros'; if (!grupos[k]) grupos[k]=[]; grupos[k].push(e); });
    extrasHtml = `<div class="extra-sections">${Object.entries(grupos).map(([cc,rows])=>buildSection(cc,rows,'expedicao')).join('')}</div>`;
  }

  content.innerHTML = gridHtml + extrasHtml;
  updateTotais(rota, expedicao, outros);
  attachMdEvents();
  setTimeout(autoScale, 0); // após o DOM renderizar
}

function buildSection(titulo, items, tipo) {
  const presentes = items.filter(([,a]) => a.status === 'Presente').length;
  const isRota = tipo === 'rota';
  const ths = isRota
    ? `<th>Nº</th><th>Nome</th><th>Operação</th><th class="center">Entrada</th><th class="center">Prev.Saída</th><th class="center">Saída</th><th>Motorista</th><th class="center">MD</th><th>Status</th>`
    : `<th>Nº</th><th>Nome</th><th>Operação</th><th class="center">Entrada</th><th class="center">Prev.Saída</th><th class="center">Saída</th><th>Status</th>`;

  const sorted = [...items].sort(([,a],[,b]) => {
    const opCmp = (a.opNome||'').localeCompare(b.opNome||'', 'pt-BR');
    if (opCmp !== 0) return opCmp;
    return (a.chegada||'').localeCompare(b.chegada||'');
  });
  const rows = sorted.map(([id, a], i) => buildRow(id, a, i+1, isRota)).join('');

  return `<div class="cc-section">
    <div class="cc-header cc-${tipo}">
      <div class="cc-title">${titulo}</div>
      <div class="cc-count">${items.length} colab. · ${presentes} presente${presentes!==1?'s':''}</div>
    </div>
    <div class="table-scroll">
      <table class="tv-table">
        <thead><tr>${ths}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function buildRow(id, a, num, isRota) {
  const chegada   = a.chegada  || '';
  const refeicao  = a.refeicao || '01:00';
  const saida     = a.saida    || '';
  const prevSaida = chegada ? calcPrevSaida(chegada, refeicao) : '';

  const statusMap = {
    'Em escolha': ['s-escolha',   'Em Escolha'],
    'Validada':   ['s-validada',  'Validada'],
    'Presente':   ['s-presente',  'Presente'],
    'Ausente':    ['s-ausente',   'Ausente'],
    'Encerrado':  ['s-encerrado', 'Encerrado']
  };
  const [sCls, sLabel] = statusMap[a.status] || ['s-escolha', a.status||'Em Escolha'];

  const motNome = a.motoristaId && STATE.motoristas[a.motoristaId]
    ? STATE.motoristas[a.motoristaId].nome : (a.motoristaNome||'—');
  const md = a.md || '';

  // ATRASO: sem entrada E horário atual já passou do horaInicial
  const semEntrada = !chegada;
  let isAtraso = false;
  if (semEntrada && a.horaInicial) {
    const now = new Date();
    const [hi, mi] = a.horaInicial.split(':').map(Number);
    isAtraso = (now.getHours() * 60 + now.getMinutes()) > (hi * 60 + mi);
  }

  // OVERTIME: entrada registrada + mais de 8h trabalhadas
  let isOvertime = false;
  if (chegada) {
    const [hc, mc] = chegada.split(':').map(Number);
    const chegadaMin = hc * 60 + mc;
    const [hr, mr] = (refeicao || '01:00').split(':').map(Number);
    const refMin = hr * 60 + mr;
    if (saida) {
      const [hs, ms] = saida.split(':').map(Number);
      isOvertime = (hs * 60 + ms) - chegadaMin - refMin > 8 * 60;
    } else {
      const now = new Date();
      isOvertime = (now.getHours() * 60 + now.getMinutes()) > (chegadaMin + 8 * 60 + refMin);
    }
  }

  // Prioridade: atraso (vermelho) > hora extra (amarelo) > normal
  const nomeClass   = isAtraso ? 'td-nome-atraso' : (isOvertime ? 'td-nome td-nome-overtime' : 'td-nome');
  const atrasoBadge = isAtraso    ? `<span class="badge-atraso">⚠ ATRASO</span>` : '';
  const extraBadge  = isOvertime  ? `<span class="badge-extra">⏱ EXTRA</span>`  : '';

  const tdNome    = `<td><div class="${nomeClass}">${a.colNome||'—'} ${atrasoBadge}${extraBadge}</div><div class="td-empresa">${a.empresaNome||''}</div></td>`;
  const tdOp      = `<td><div class="td-op">${a.opNome||'—'}</div><div class="td-func">${a.funcao||''}</div></td>`;
  const tdEntrada = `<td class="td-time entrada${isOvertime ? ' entrada-overtime' : ''}">${chegada||'——'}</td>`;
  const tdPrev    = `<td class="td-time saida-prev">${prevSaida||'——'}</td>`;
  const tdSaida   = `<td class="td-time saida-real">${saida||'——'}</td>`;
  const tdStatus  = `<td><span class="status-pill ${sCls}">${sLabel}</span></td>`;

  if (isRota) {
    return `<tr>
      <td class="td-num">${num}</td>${tdNome}${tdOp}${tdEntrada}${tdPrev}${tdSaida}
      <td class="td-motorista">${motNome}</td>
      <td><input class="md-input" data-id="${id}" value="${md}" placeholder="MD nº"></td>
      ${tdStatus}</tr>`;
  }
  return `<tr><td class="td-num">${num}</td>${tdNome}${tdOp}${tdEntrada}${tdPrev}${tdSaida}${tdStatus}</tr>`;
}

function calcPrevSaida(chegada, refeicao) {
  const [h,m]   = chegada.split(':').map(Number);
  const [rh,rm] = (refeicao||'01:00').split(':').map(Number);
  const t = h*60 + m + 8*60 + rh*60 + rm;
  return String(Math.floor(t/60)%24).padStart(2,'0') + ':' + String(t%60).padStart(2,'0');
}

function updateTotais(rota, expedicao, outros) {
  const todos = [...rota, ...expedicao, ...(outros||[])];
  document.getElementById('tot-total').textContent     = todos.length;
  document.getElementById('tot-presentes').textContent = todos.filter(([,a])=>a.status==='Presente').length;
  document.getElementById('tot-rota').textContent      = rota.length;
  document.getElementById('tot-expedicao').textContent = expedicao.length;
}

function attachMdEvents() {
  document.querySelectorAll('.md-input').forEach(inp => {
    inp.addEventListener('input', () => {
      const id = inp.dataset.id;
      clearTimeout(mdSaveTimeout[id]);
      mdSaveTimeout[id] = setTimeout(() => db.ref(`acompanhamento/${id}/md`).set(inp.value.trim()), 800);
    });
  });
}

// ===== AUTO-SCALE: preenche a tela inteira sem cortar nada =====
function autoScale() {
  const root = document.getElementById('app-root');
  if (!root) return;

  // Reset para medir tamanho natural
  root.style.transform = 'none';
  root.style.width = window.innerWidth + 'px';

  const naturalH = root.scrollHeight;
  if (!naturalH) return;

  const viewW = window.innerWidth;
  const viewH = window.innerHeight;
  const scale  = viewH / naturalH;

  root.style.transform      = `scale(${scale})`;
  root.style.transformOrigin = 'top left';
  // Ajusta largura para que, após scale, visual = viewW
  root.style.width = Math.ceil(viewW / scale) + 'px';
}

window.addEventListener('resize', autoScale);
</script>
